/* Convert to Set for fast lookup (normalize to uppercase) */
const SSC_JE_SET = new Set(
  SSC_JE_SHORTLIST_RAW.trim().toUpperCase().split(/\s+/).filter(Boolean)
);

/* ================================
   MAIN CHECK FUNCTION
   No limit / any format for Roll Number
   ================================ */

function checkSSCJE() {
  const roll = document.getElementById("sscJeRoll").value.trim().toUpperCase();
  const mobile = document.getElementById("sscJeMobile").value.trim();

  // Allow any roll number, only block if empty
  if (roll === "") {
    showSSCJE("Please enter your Roll Number.", false);
    return;
  }

  // Indian mobile validation
  if (!/^[6-9]\d{9}$/.test(mobile)) {
    showSSCJE("Please enter a valid 10-digit mobile number.", false);
    return;
  }

  // If shortlist list is empty, avoid false negatives
  if (SSC_JE_SET.size === 0) {
    showSSCJE(
      "Shortlist data is not added yet. Please paste shortlisted roll numbers in SSC_JE_SHORTLIST_RAW.",
      false
    );
    return;
  }

  const found = SSC_JE_SET.has(roll);

  showSSCJE(
    found
      ? `✔ ELIGIBLE: Roll Number ${roll} is shortlisted/qualified as per the list. Students are advised to verify using the official SSC JE result PDF/notice for 100% confirmation.`
      : `✖ NOT ELIGIBLE: Roll Number ${roll} is not in the list. Students are advised to verify using the official SSC JE result PDF/notice for 100% confirmation.`,
    found
  );

  // Send lead to Google Sheet
  sendToSheetSSCJE(mobile, roll, found ? "Eligible" : "Not Eligible");
}

/* ================================
   UI MESSAGE HANDLER
   ================================ */

function showSSCJE(msg, success) {
  const box = document.getElementById("sscJeResult");
  box.style.background = success ? "#dcfce7" : "#fee2e2";
  box.style.color = success ? "#166534" : "#991b1b";
  box.innerText = msg;
}

/* ================================
   GOOGLE SHEET INTEGRATION
   ================================ */

function sendToSheetSSCJE(mobile, roll, result) {
  const fd = new FormData();
  fd.append("mobile", mobile);
  fd.append("roll", roll);
  fd.append("result", result);
  fd.append("exam", "SSC JE");

  fetch(
    "https://script.google.com/macros/s/AKfycbxiLMOTpoNXoCD3aF0ub-sGOV6KMYWPy9ybZszTTh7RG4iz_Zq2Akqi695wzN3VHoAu/exec",
    {
      method: "POST",
      body: fd
    }
  ).catch(() => {});
}
